appId: com.tanuki75.noctalia
---
# Manual guarded Test Store purchase flow.
# Run only through scripts/run-subscription-teststore-purchase.js with explicit approval env.

- runFlow: subflows/open-release-app-preserve-state.yml
- openLink: noctalia://settings
- extendedWaitUntil:
    visible: "Settings|Paramètres|Configuración|Ajustes"
    timeout: 30000

- runFlow:
    when:
      notVisible:
        id: text.auth.email
    commands:
      - scrollUntilVisible:
          element:
            id: input.auth.email
          direction: DOWN
          visibilityPercentage: 70
          timeout: 30000
      - tapOn:
          id: input.auth.email
      - eraseText
      - inputText: ${QA_EMAIL}
      - tapOn:
          id: input.auth.password
      - eraseText
      - inputText: ${QA_PASSWORD}
      - runFlow:
          when:
            visible: "Use your saved password.*"
          commands:
            - tapOn:
                text: "No thanks"
                optional: true
      - pressKey: back
      - scrollUntilVisible:
          element:
            id: btn.auth.signIn
          direction: DOWN
          visibilityPercentage: 70
          timeout: 30000
      - tapOn:
          id: btn.auth.signIn
- extendedWaitUntil:
    visible:
      id: text.auth.email
      text: "${QA_EMAIL_REGEX}"
    timeout: 45000
- scrollUntilVisible:
    element:
      text: "Subscription QA Lab"
    direction: DOWN
    visibilityPercentage: 40
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.mode
    text: "RevenueCat Test Store"

# A timed-out attempt is ambiguous. Fail closed if this exact product is
# already active so a retry cannot create another Test Store transaction.
- scrollUntilVisible:
    element:
      id: text.subscription.qa.product
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
- assertNotVisible:
    id: text.subscription.qa.product
    text: "(?i)^${QA_PRODUCT_ID}$"

- scrollUntilVisible:
    element:
      id: "btn.subscription.qa.scenario.${QA_PLAN}"
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
- tapOn:
    id: "btn.subscription.qa.scenario.${QA_PLAN}"
- extendedWaitUntil:
    visible: "^Test Store Purchase$"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "^android:id/button1$"
      text: "(?i)^Test valid Purchase$"
      enabled: true
    timeout: 30000
- tapOn:
    id: "^android:id/button1$"
- extendedWaitUntil:
    notVisible:
      id: "^android:id/button1$"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: text.subscription.qa.actionLabel
      text: ".*${QA_PLAN} purchase completed.*"
    timeout: 180000
- scrollUntilVisible:
    element:
      id: text.subscription.qa.status
    direction: UP
    visibilityPercentage: 60
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.status
    text: ".*plus / active.*"
