url: "http://localhost:8081"
---
- runFlow: subflows/web-select-existing-mock-profile.yml
- tapOn: "(Home|Accueil)"
- waitForAnimationToEnd
- tapOn: "(Add New Dream|Ajouter un r.ve|Agregar sue.o)"
- waitForAnimationToEnd
- assertVisible:
    id: "screen.recording"
- runFlow:
    when:
      visible:
        id: "btn.recording.switchToText"
    commands:
      - tapOn:
          id: "btn.recording.switchToText"
      - waitForAnimationToEnd
- tapOn:
    id: "input.dreamTranscript"
- inputText: "I walked through a quiet garden under a silver moon."
- tapOn:
    id: "btn.saveDream"
- waitForAnimationToEnd
- assertVisible:
    id: "text.analyzePromptTitle"
- tapOn:
    id: "btn.analyzePrompt.journal"
- waitForAnimationToEnd
- assertVisible: "(Dream Journey|Voyage onirique|Viaje on.rico)"
