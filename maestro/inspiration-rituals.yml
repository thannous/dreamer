# Ensure the bundle identifier matches the local dev build.
appId: com.tanuki75.noctalia
---
- runFlow: subflows/open-mock-app.yml
- tapOn:
      id: btn.mockNav.home
- swipe:
      start: 50%, 78%
      end: 50%, 28%
- assertVisible: ".*Rituel du jour.*|.*Ritual de hoy.*|.*Today's ritual.*"

# Open the lucid dream ritual and verify a lucid-specific step
- tapOn:
      id: btn.inspiration.ritual.lucid
- waitForAnimationToEnd
- scrollUntilVisible:
      element:
          text: "Intention lucide|Lucid intention|Intención lúcida"
      direction: DOWN
- assertVisible: "Intention lucide|Lucid intention|Intención lúcida"

- pressKey: back
- waitForAnimationToEnd
- assertVisible: ".*Rituel du jour.*|.*Ritual de hoy.*|.*Today's ritual.*"

# Open the starter ritual and ensure the calm evening step is shown
- tapOn:
      id: btn.inspiration.ritual.starter
- waitForAnimationToEnd
- scrollUntilVisible:
      element:
          text: "Soir calme|Calm evening|Noche tranquila"
      direction: DOWN
- assertVisible: "Soir calme|Calm evening|Noche tranquila"

- pressKey: back
- waitForAnimationToEnd
- assertVisible: ".*Rituel du jour.*|.*Ritual de hoy.*|.*Today's ritual.*"

# Scroll the horizontal ritual carousel, open the recall ritual, and verify one step
- scrollUntilVisible:
      element:
          id: btn.inspiration.ritual.memory
      direction: RIGHT
      timeout: 20000
- tapOn:
      id: btn.inspiration.ritual.memory
- waitForAnimationToEnd
- scrollUntilVisible:
      element:
          text: "Préparer la mémoire|Prime your recall|Preparar el recuerdo"
      direction: DOWN
- assertVisible: "Préparer la mémoire|Prime your recall|Preparar el recuerdo"
