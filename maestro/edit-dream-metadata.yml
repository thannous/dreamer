appId: com.tanuki75.noctalia
---
- runFlow: subflows/open-mock-app.yml

# Switch to existing user profile to load predefined dreams
- runFlow: subflows/select-existing-mock-profile.yml
- tapOn:
      id: btn.mockNav.journal
- extendedWaitUntil:
      visible:
          id: screen.journal
      timeout: 30000
- runFlow: subflows/clear-journal-filters.yml

# Open a specific dream (assuming mock data "The Infinite Library")
- runFlow: subflows/ensure-journal-search-visible.yml
- tapOn:
      id: input.searchDreams
- eraseText
- inputText: "The Infinite Library"
- hideKeyboard
- extendedWaitUntil:
      visible: "The Infinite Library"
      timeout: 10000
- assertVisible: "The Infinite Library"
- tapOn:
      point: "50%,56%"

# Verify initial state (Read Mode)
- assertVisible: "Symbolic Dream"
- assertVisible: "Mystical"

# Enter edit mode
- tapOn:
      id: btn.editMetadata

# Verify chips are visible (Edit Mode)
- assertVisible: "Lucid Dream"
- assertVisible: "Symbolic Dream"

# Update dream title
- tapOn: "The Infinite Library"
- eraseText
- inputText: "The Infinite dark"
- hideKeyboard
- extendedWaitUntil:
      visible:
          id: chip.type.Symbolic Dream
      timeout: 10000

# Select new type "Nightmare"
- swipe:
      from:
          id: chip.type.Symbolic Dream
      direction: LEFT
      duration: 500
- tapOn:
      id: chip.type.Nightmare

# Save changes
- tapOn:
      id: btn.editMetadata

# Verify new state (Read Mode)
- assertVisible: "Nightmare"
- assertVisible: "Mystical"

# Verify old values are gone (only selected values are shown in Read Mode)
- assertNotVisible: "Symbolic Dream"

# Navigate back to journal and verify updated title in list
- tapOn:
      id: btn.navigateJournal
- extendedWaitUntil:
      visible:
          id: screen.journal
      timeout: 30000
- runFlow: subflows/clear-journal-filters.yml
- assertVisible:
      id: screen.journal
- assertVisible: "The Infinite dark"
