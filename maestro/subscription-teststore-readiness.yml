appId: com.tanuki75.noctalia
---
- runFlow: subflows/open-mock-app.yml
- openLink: noctalia://settings
- extendedWaitUntil:
    visible: "Settings|Paramètres|Configuración|Ajustes"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Subscription QA Lab"
    direction: DOWN
    visibilityPercentage: 40
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.mode
- assertVisible: "RevenueCat Test Store"
- assertVisible: "PACKAGES"
- assertVisible: "2"
- scrollUntilVisible:
    element:
      text: "Buy monthly"
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
- assertVisible: "Buy annual"
- assertVisible: "\\$9\\.99"
- assertVisible: "\\$79\\.98"
