# Ensure the bundle identifier matches the local dev build (Expo Go / dev client).
appId: com.tanuki75.noctalia
---
- runFlow: subflows/open-mock-app.yml
- runFlow:
    when:
      visible:
        id: btn.navigateJournal
    commands:
      - tapOn:
          id: btn.navigateJournal
- runFlow:
    when:
      visible:
        id: btn.mockNav.journal
    commands:
      - tapOn:
          id: btn.mockNav.journal
- extendedWaitUntil:
    visible:
      id: screen.journal
    timeout: 30000
- runFlow: subflows/select-existing-mock-profile.yml
- tapOn:
    id: tab.journal
- extendedWaitUntil:
    visible:
      id: screen.journal
    timeout: 30000
- runFlow: subflows/clear-journal-filters.yml
- assertVisible: "The Infinite Library"
