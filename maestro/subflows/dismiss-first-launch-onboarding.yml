appId: com.tanuki75.noctalia
---
- runFlow:
    when:
      visible:
        id: screen.onboarding
    commands:
      - runFlow:
          when:
            visible:
              id: component.onboarding.intro
          commands:
            - tapOn:
                id: btn.onboarding.intro.next
            - extendedWaitUntil:
                visible:
                  id: btn.onboarding.path.analyze
                timeout: 10000
      - runFlow:
          when:
            visible:
              id: btn.onboarding.path.analyze
          commands:
            - tapOn:
                id: btn.onboarding.primary
            - extendedWaitUntil:
                visible:
                  id: component.onboarding.capture
                timeout: 10000
      - runFlow:
          when:
            visible:
              id: component.onboarding.capture
          commands:
            - tapOn:
                id: btn.onboarding.primary
