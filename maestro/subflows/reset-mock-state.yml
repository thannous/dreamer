appId: com.tanuki75.noctalia
---
- runFlow:
    when:
      visible:
        id: btn.navigateJournal
    commands:
      - tapOn:
          id: btn.navigateJournal
      - waitForAnimationToEnd
- tapOn:
    id: btn.mockNav.settings
- scrollUntilVisible:
    element:
      id: btn.mock.resetState
    direction: DOWN
- tapOn:
    id: btn.mock.resetState
- waitForAnimationToEnd
- tapOn:
    id: btn.mockNav.home
- extendedWaitUntil:
    visible:
      id: screen.recording
    timeout: 20000
