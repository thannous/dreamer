appId: com.tanuki75.noctalia
---
- runFlow:
    when:
      visible:
        id: btn.navigateJournal
    commands:
      - tapOn:
          id: btn.navigateJournal
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: screen.recording
    commands:
      - swipe:
          start: 50%, 88%
          end: 50%, 38%
      - waitForAnimationToEnd
      - tapOn:
          id: btn.navigateJournal
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: btn.mockNav.settings
    commands:
      - tapOn:
          id: btn.mockNav.settings
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: Home
    commands:
      - tapOn:
          point: "88%,92%"
      - waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: btn.mock.resetState
    direction: DOWN
- tapOn:
    id: btn.mock.resetState
- waitForAnimationToEnd
- runFlow: open-mock-app.yml
