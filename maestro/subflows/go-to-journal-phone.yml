appId: com.tanuki75.noctalia
---
- runFlow:
    when:
      visible:
        id: btn.navigateJournal
    commands:
      - tapOn:
          id: btn.navigateJournal
      - extendedWaitUntil:
          visible:
            text: Journal
          timeout: 10000
- runFlow:
    when:
      visible:
        id: btn.mockNav.journal
    commands:
      - tapOn:
          id: btn.mockNav.journal
- runFlow:
    when:
      visible:
        id: tab.journal
    commands:
      - tapOn:
          id: tab.journal
- runFlow:
    when:
      visible:
        text: Journal
    commands:
      - tapOn:
          text: Journal
- runFlow:
    when:
      visible:
        text: J
    commands:
      - tapOn:
          text: J
- runFlow:
    when:
      visible:
        id: screen.recording
    commands:
      - swipe:
          start: 50%, 88%
          end: 50%, 38%
      - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              id: btn.navigateJournal
          commands:
            - tapOn:
                id: btn.navigateJournal
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible: "Explore the dreamscape"
          commands:
            - tapOn: "Explore the dreamscape"
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              id: screen.recording
          commands:
            - tapOn:
                point: "50%,92%"
            - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: screen.recording
    commands:
      - tapOn:
          point: "74%,4%"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: Home
    commands:
      - runFlow:
          when:
            visible:
              id: tab.journal
          commands:
            - tapOn:
                id: tab.journal
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible: Home
          commands:
            - tapOn:
                point: "38%,92%"
            - waitForAnimationToEnd
- extendedWaitUntil:
    visible:
      id: screen.journal
    timeout: 20000
- assertVisible:
    id: screen.journal
