appId: com.tanuki75.noctalia
---
- scrollUntilVisible:
    element:
      id: input.auth.email
    direction: DOWN
    visibilityPercentage: 70
    timeout: 30000
- tapOn:
    id: input.auth.email
- eraseText
- inputText: ${REVENUECAT_QA_SWITCH_FREE_EMAIL}
- runFlow:
    when:
      visible: "Use your saved password.*"
    commands:
      - tapOn:
          text: "No thanks"
          optional: true
- pressKey: back
- scrollUntilVisible:
    element:
      id: input.auth.password
    direction: DOWN
    visibilityPercentage: 70
    timeout: 30000
- tapOn:
    id: input.auth.password
- eraseText
- inputText: ${REVENUECAT_QA_SWITCH_FREE_PASSWORD}
- runFlow:
    when:
      visible: "Use your saved password.*"
    commands:
      - tapOn:
          text: "No thanks"
          optional: true
- pressKey: back
- scrollUntilVisible:
    element:
      id: btn.auth.signIn
    direction: DOWN
    visibilityPercentage: 70
    timeout: 30000
- tapOn:
    id: btn.auth.signIn
