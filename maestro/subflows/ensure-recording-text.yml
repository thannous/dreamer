appId: com.tanuki75.noctalia
---
- assertVisible:
    id: screen.recording
- runFlow:
    when:
      visible:
        id: btn.recording.switchToText
    commands:
      - tapOn:
          id: btn.recording.switchToText
      - extendedWaitUntil:
          visible:
            id: input.dreamTranscript
          timeout: 10000
- assertVisible:
    id: input.dreamTranscript
