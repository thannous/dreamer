url: "http://localhost:8081"
---
- runFlow: subflows/web-select-existing-mock-profile.yml
- tapOn: "Journal"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: "Ocean of Stars"
    direction: DOWN
- tapOn: "Ocean of Stars"
- waitForAnimationToEnd
- assertVisible: "Ocean of Stars"
- scrollUntilVisible:
    element:
      id: "component.dreamDetail.actionCard"
    direction: DOWN
    visibilityPercentage: 30
    centerElement: false
- tapOn:
    id: "component.dreamDetail.actionCard"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: "component.exploration360.panel"
    direction: DOWN
    visibilityPercentage: 30
    centerElement: true
- assertVisible:
    id: "component.exploration360.panel"
- assertVisible: "Exploration 360°"
- assertVisible: "1/3 angles explored|1/3 angles explorés"
- scrollUntilVisible:
    element:
      id: "btn.dreamCategory.symbols"
    direction: DOWN
    visibilityPercentage: 30
    centerElement: true
- evalScript: ${output.chatReady = 0}
- evalScript: ${output.chatAttempts = 0}
- repeat:
    while:
      true: ${output.chatReady == 0 && output.chatAttempts < 3}
    commands:
      - evalScript: ${output.chatAttempts = output.chatAttempts + 1}
      - runFlow:
          when:
            visible:
              id: "chat.input.message"
          commands:
            - evalScript: ${output.chatReady = 1}
      - runFlow:
          when:
            visible:
              id: "btn.dreamCategory.freeChat"
          commands:
            - tapOn:
                id: "btn.dreamCategory.freeChat"
                retryTapIfNoChange: true
                waitToSettleTimeoutMs: 500
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              id: "btn.dreamCategory.symbols"
          commands:
            - tapOn:
                id: "btn.dreamCategory.symbols"
                retryTapIfNoChange: true
                waitToSettleTimeoutMs: 500
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              id: "btn.dream.primaryCta"
          commands:
            - tapOn:
                id: "btn.dream.primaryCta"
                retryTapIfNoChange: true
                waitToSettleTimeoutMs: 500
            - waitForAnimationToEnd
      - runFlow:
          when:
            visible:
              id: "component.dreamDetail.actionCard"
          commands:
            - tapOn:
                id: "component.dreamDetail.actionCard"
                retryTapIfNoChange: true
                waitToSettleTimeoutMs: 500
            - waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: "chat.input.message"
    direction: DOWN
    visibilityPercentage: 30
- assertVisible:
    id: "chat.input.message"
- tapOn:
    id: "chat.input.message"
- inputText: "Tell me more about the symbols"
- tapOn:
    id: "chat.button.send"
- waitForAnimationToEnd
- assertVisible: "Tell me more about the symbols"
