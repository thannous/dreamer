appId: com.tanuki75.noctalia
---
# Guest quota migration flow: analyses + explorations carry over after signup.
- runFlow: subflows/open-mock-app.yml
- runFlow: subflows/reset-mock-state.yml

# Guest dream 1 - analyze and start exploration
- runFlow: subflows/ensure-recording-text.yml
- tapOn:
    id: input.dreamTranscript
- inputText: "Guest Dream 1"
- tapOn:
    id: btn.saveDream
- waitForAnimationToEnd
- assertVisible:
    id: text.firstDream.title
- tapOn:
    id: btn.firstDream.analyze
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: btn.exploreDream
    direction: DOWN
- tapOn:
    id: btn.exploreDream
- tapOn:
    id: btn.dreamCategory.symbols
- assertVisible:
    id: chat.input.message
- runFlow:
    file: subflows/send-chat-message.yml
    env:
      MESSAGE: "First exploration"
- pressKey: back
- pressKey: back
- pressKey: back
- waitForAnimationToEnd

# Guest dream 2 - use second analysis and second exploration
- tapOn:
    id: btn.addDream
- runFlow: subflows/ensure-recording-text.yml
- tapOn:
    id: input.dreamTranscript
- inputText: "Guest Dream 2"
- tapOn:
    id: btn.saveDream
- waitForAnimationToEnd
- assertVisible:
    id: text.analyzePromptTitle
- tapOn:
    id: btn.analyzePrompt.analyze
- waitForAnimationToEnd
- assertVisible:
    id: btn.exploreDream
- tapOn:
    id: btn.exploreDream
- tapOn:
    id: btn.dreamCategory.emotions
- assertVisible:
    id: chat.input.message
- runFlow:
    file: subflows/send-chat-message.yml
    env:
      MESSAGE: "Second exploration"
- pressKey: back
- pressKey: back
- pressKey: back
- waitForAnimationToEnd

# Guest dream 3 - analysis limit hit when trying to analyze
- tapOn:
    id: btn.addDream
- runFlow: subflows/ensure-recording-text.yml
- tapOn:
    id: input.dreamTranscript
- inputText: "Guest Dream 3"
- tapOn:
    id: btn.saveDream
- waitForAnimationToEnd
- assertVisible:
    id: text.analyzePromptTitle
- tapOn:
    id: btn.analyzePrompt.analyze
- waitForAnimationToEnd
- assertVisible:
    id: sheet.quotaLimit
- assertVisible:
    id: text.quotaLimit.title
- tapOn:
    id: btn.quotaLimit.journal
- waitForAnimationToEnd
- assertVisible:
    id: btn.exploreDream
- tapOn:
    id: btn.exploreDream
- tapOn:
    id: btn.dreamCategory.symbols
- assertVisible:
    id: chat.screen.blocked
- tapOn:
    id: btn.mockNav.journal

# Create account to migrate guest quotas
- tapOn:
    id: btn.mockNav.settings
- tapOn:
    id: input.auth.email
- inputText: "mock.guest@dreamer.test"
- tapOn:
    id: input.auth.password
- inputText: "mockpass"
- tapOn:
    id: btn.auth.signUp
- tapOn: "OK"
- assertVisible:
    id: component.emailVerificationBanner
- tapOn:
    id: btn.auth.resendVerification
- waitForAnimationToEnd
- assertNotVisible:
    id: component.emailVerificationBanner
- assertVisible:
    id: text.auth.email
- assertVisible: "2 / 3"
- assertVisible: "2 / 2"

# Authenticated analyses (one more to reach three total)
- tapOn:
    id: btn.mockNav.home
- runFlow: subflows/ensure-recording-text.yml
- tapOn:
    id: input.dreamTranscript
- inputText: "Auth Dream 1"
- tapOn:
    id: btn.saveDream
- waitForAnimationToEnd
- assertVisible:
    id: text.analyzePromptTitle
- tapOn:
    id: btn.analyzePrompt.analyze
- waitForAnimationToEnd
- assertVisible:
    id: btn.exploreDream
- tapOn:
    id: btn.mockNav.home

# Auth Dream 2 - analysis quota exhausted (3/3)
- runFlow: subflows/ensure-recording-text.yml
- tapOn:
    id: input.dreamTranscript
- inputText: "Auth Dream 2"
- tapOn:
    id: btn.saveDream
- waitForAnimationToEnd
- assertVisible:
    id: text.analyzePromptTitle
- tapOn:
    id: btn.analyzePrompt.analyze
- waitForAnimationToEnd
- assertVisible:
    id: sheet.quotaLimit
- assertVisible:
    id: text.quotaLimit.title
- tapOn:
    id: btn.quotaLimit.journal
- waitForAnimationToEnd
- tapOn:
    id: btn.mockNav.settings
- assertVisible: "3 / 3"
