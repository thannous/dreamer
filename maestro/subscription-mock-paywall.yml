appId: com.tanuki75.noctalia
---
# Validate subscription paywall flow in mock mode

- runFlow: subflows/open-mock-app.yml

# If paywall already open, close it to reset state
- runFlow:
      when:
          visible:
              id: btn.paywall.close
      commands:
          - tapOn:
                id: btn.paywall.close
          - waitForAnimationToEnd

# Quick sign-in (mock mode) as an existing free user
- runFlow: subflows/select-existing-mock-profile.yml

# Open the paywall from the real subscription card CTA. The dedicated
# subscription-qa-lab flow separately covers the mock QA lab entry point.
- scrollUntilVisible:
      element:
          id: btn.subscription.settingsCta
      direction: DOWN
      visibilityPercentage: 60
      centerElement: true
      timeout: 30000
- tapOn:
      id: btn.subscription.settingsCta
- waitForAnimationToEnd

# Paywall screen should be visible (settings variant, free header, or active header)
- assertVisible: "Noctalia Plus, deeper dream patterns|Noctalia Plus, des motifs plus profonds|Noctalia Plus, patrones más profundos|Noctalia Plus, tiefere Traummuster|Noctalia Plus, pattern più profondi|Noctalia Plus is active|Noctalia Plus est actif|Noctalia Plus está activo|Noctalia Plus ist aktiv|Noctalia Plus è attivo"
- assertVisible: "Noctalia Plus, profile depth|Noctalia Plus, profondeur du profil|Noctalia Plus, profundidad de perfil|Noctalia Plus, mehr Profiltiefe|Noctalia Plus, profondità del profilo"
- assertVisible: "Monthly|Mensuel|Mensual|Monatlich|Mensile"
- assertVisible: "Annual|Annuel|Anual|Jährlich|Annuale"

# Select the monthly option and purchase
- tapOn:
      id: btn.paywall.selectMonthly
- tapOn:
      id: btn.paywall.purchase
- waitForAnimationToEnd

# After mock purchase, header should reflect premium state
- assertVisible: "Noctalia Plus is active|Noctalia Plus est actif|Noctalia Plus está activo|Noctalia Plus ist aktiv|Noctalia Plus è attivo|Already active|Déjà actif|Ya activo|Bereits aktiv|Già attivo"

# Close paywall and verify subscription card reflects active state
- pressKey: back
- waitForAnimationToEnd
- scrollUntilVisible:
      element:
          text: "Your living dream profile and 360° explorations are active.|Votre profil onirique vivant et vos explorations 360° sont actifs.|Tu perfil onírico vivo y tus exploraciones 360° están activos.|Dein lebendiges Traumprofil und deine 360°-Erkundungen sind aktiv.|Il tuo profilo onirico vivo e le esplorazioni 360° sono attivi."
      direction: DOWN
      visibilityPercentage: 50
      centerElement: true
- assertVisible: "Your living dream profile and 360° explorations are active.|Votre profil onirique vivant et vos explorations 360° sont actifs.|Tu perfil onírico vivo y tus exploraciones 360° están activos.|Dein lebendiges Traumprofil und deine 360°-Erkundungen sind aktiv.|Il tuo profilo onirico vivo e le esplorazioni 360° sono attivi."
