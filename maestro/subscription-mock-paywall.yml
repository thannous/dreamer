appId: com.tanuki75.noctalia
---
# Validate subscription paywall flow in mock mode

- runFlow: subflows/open-mock-app.yml

# If paywall already open, close it to reset state
- runFlow:
      when:
          visible:
              id: btn.paywall.close
      commands:
          - tapOn:
                id: btn.paywall.close
          - waitForAnimationToEnd

# Quick sign-in (mock mode) as an existing free user
- runFlow: subflows/select-existing-mock-profile.yml

# Open the paywall from the real subscription card CTA. The dedicated
# subscription-qa-lab flow separately covers the mock QA lab entry point.
- scrollUntilVisible:
      element:
          id: btn.subscription.settingsCta
      direction: DOWN
      visibilityPercentage: 60
      centerElement: true
      timeout: 30000
- tapOn:
      id: btn.subscription.settingsCta
- waitForAnimationToEnd

# Paywall screen should be visible (settings variant, free header, or active header)
- assertVisible: "Noctalia Plus for deeper nights|Noctalia Plus pour des nuits plus profondes|Unlock Noctalia Plus|Débloquer Noctalia Plus|Desbloquea Noctalia Plus|Noctalia Plus is active|Noctalia Plus est actif|Noctalia Plus está activo|Premium is active|Premium est actif|Premium está activo"
- assertVisible: "Noctalia Plus dream analysis|Analyse de rêves Noctalia Plus|Análisis de sueños Noctalia Plus|Premium dream analysis|Analyse de rêves premium|Análisis de sueños premium"
- assertVisible: "Monthly|Mensuel|Mensual"
- assertVisible: "Annual|Annuel|Anual"

# Select the monthly option and purchase
- tapOn:
      id: btn.paywall.selectMonthly
- tapOn:
      id: btn.paywall.purchase
- waitForAnimationToEnd

# After mock purchase, header should reflect premium state
- assertVisible: "Noctalia Plus is active|Noctalia Plus est actif|Noctalia Plus está activo|Premium is active|Premium est actif|Premium está activo|Already active|Déjà actif|Ya activo"

# Close paywall and verify subscription card reflects active state
- pressKey: back
- waitForAnimationToEnd
- scrollUntilVisible:
      element:
          text: "Noctalia Plus is active on your account.|Noctalia Plus est actif sur votre compte.|Noctalia Plus está activo en tu cuenta.|Premium is active on your account.|Le premium est actif sur votre compte.|Premium está activo en tu cuenta."
      direction: DOWN
      visibilityPercentage: 50
      centerElement: true
- assertVisible: "Noctalia Plus is active on your account.|Noctalia Plus est actif sur votre compte.|Noctalia Plus está activo en tu cuenta.|Premium is active on your account.|Le premium est actif sur votre compte.|Premium está activo en tu cuenta."
