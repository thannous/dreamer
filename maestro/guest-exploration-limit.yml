# Guest exploration limit: exhaust guest exploration credits across multiple dreams
appId: com.tanuki75.noctalia
---
- runFlow: subflows/open-mock-app.yml
- runFlow: subflows/reset-mock-state.yml

# Dream 1 - analyze and explore
- runFlow: subflows/ensure-recording-text.yml
- tapOn:
    id: input.dreamTranscript
- inputText: "Exploration Limit Dream 1"
- tapOn:
    id: btn.saveDream
- waitForAnimationToEnd
- assertVisible:
    id: text.firstDream.title
- tapOn:
    id: btn.firstDream.analyze
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: btn.exploreDream
    direction: DOWN
- tapOn:
    id: btn.exploreDream
- tapOn:
    id: btn.dreamCategory.symbols
- assertVisible:
    id: chat.input.message
- runFlow:
    file: subflows/send-chat-message.yml
    env:
      MESSAGE: "Hello exploration 1"
- pressKey: back
- pressKey: back
- pressKey: back
- waitForAnimationToEnd

# Dream 2 - analyze and explore
- tapOn:
    id: btn.addDream
- runFlow: subflows/ensure-recording-text.yml
- tapOn:
    id: input.dreamTranscript
- inputText: "Exploration Limit Dream 2"
- tapOn:
    id: btn.saveDream
- waitForAnimationToEnd
- assertVisible:
    id: text.analyzePromptTitle
- tapOn:
    id: btn.analyzePrompt.analyze
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: btn.exploreDream
    direction: DOWN
- tapOn:
    id: btn.exploreDream
- tapOn:
    id: btn.dreamCategory.emotions
- assertVisible:
    id: chat.input.message
- runFlow:
    file: subflows/send-chat-message.yml
    env:
      MESSAGE: "Hello exploration 2"
- pressKey: back
- pressKey: back
- pressKey: back
- waitForAnimationToEnd

# Dream 3 - exploration limit should be reached
- tapOn:
    id: btn.addDream
- runFlow: subflows/ensure-recording-text.yml
- tapOn:
    id: input.dreamTranscript
- inputText: "Exploration Limit Dream 3"
- tapOn:
    id: btn.saveDream
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: btn.analyzePrompt.analyze
    commands:
      - tapOn:
          id: btn.analyzePrompt.analyze
      - waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: btn.exploreDream
    commands:
      - scrollUntilVisible:
          element:
            id: btn.exploreDream
          direction: DOWN
      - tapOn:
          id: btn.exploreDream
      - tapOn:
          id: btn.dreamCategory.growth
      - waitForAnimationToEnd
- assertVisible:
    id: chat.screen.blocked
