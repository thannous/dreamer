# Recording bottom-sheet smoke: first dream then analyze prompt on the next one
appId: com.tanuki75.noctalia
---
- runFlow: subflows/open-mock-app.yml
- runFlow: subflows/reset-mock-state.yml

# First dream should open the first-dream sheet
- runFlow: subflows/ensure-recording-text.yml
- tapOn:
    id: input.dreamTranscript
- inputText: "Bottom Sheet Dream 1"
- tapOn:
    id: btn.saveDream
- waitForAnimationToEnd
- assertVisible:
    id: text.firstDream.title
- tapOn:
    id: btn.firstDream.dismiss

# Second dream should open the analyze-prompt sheet
- runFlow: subflows/ensure-recording-text.yml
- tapOn:
    id: input.dreamTranscript
- inputText: "Bottom Sheet Dream 2"
- tapOn:
    id: btn.saveDream
- waitForAnimationToEnd
- assertVisible:
    id: text.analyzePromptTitle
