appId: com.tanuki75.noctalia
---
# Manual guarded Test Store restore flow using native Google Sign-In.
# Run after a completed Test Store purchase and app reinstall/reset.
# The wrapper requires separate restore + clearState approvals and defaults to an emulator.

- runFlow: subflows/open-release-app-clear-state.yml
- openLink: noctalia://settings
- extendedWaitUntil:
    visible: "Settings|Paramètres|Configuración|Ajustes|Impostazioni|Einstellungen"
    timeout: 30000

# Reset the settings scroll before locating the signed-out account card. This
# keeps restore deterministic when the clear-state launch finishes at a
# different vertical offset.
- scrollUntilVisible:
    element:
      text: "Account|Compte|Cuenta|Konto"
    direction: UP
    visibilityPercentage: 40
    timeout: 30000
- runFlow:
    when:
      notVisible:
        id: text.auth.email
    commands:
      - scrollUntilVisible:
          element:
            id: btn.auth.google
          direction: DOWN
          visibilityPercentage: 60
          timeout: 30000
          centerElement: true
      - extendedWaitUntil:
          visible:
            id: btn.auth.google
            enabled: true
          timeout: 30000
      - tapOn:
          id: btn.auth.google
      # Google Sign-In can either auto-select the only device account or show
      # the native chooser. Select the first chooser row only when it exists;
      # the exact app identity is always asserted below.
      - runFlow:
          when:
            visible:
              id: "com.google.android.gms:id/container"
          commands:
            - tapOn:
                id: "com.google.android.gms:id/container"
                index: 0
- extendedWaitUntil:
    visible:
      id: text.auth.email
      text: "${QA_EMAIL_REGEX}"
    timeout: 60000
- assertVisible:
    id: text.auth.email
    text: "${QA_EMAIL_REGEX}"

- scrollUntilVisible:
    element:
      id: screen.subscription.qaLab
    direction: DOWN
    visibilityPercentage: 30
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.mode
    text: "RevenueCat Test Store"
- scrollUntilVisible:
    element:
      id: btn.subscription.qa.scenario.restore
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
    centerElement: true
- extendedWaitUntil:
    visible:
      id: btn.subscription.qa.scenario.restore
      enabled: true
    timeout: 120000
- tapOn:
    id: btn.subscription.qa.scenario.restore
- scrollUntilVisible:
    element:
      id: text.subscription.qa.actionLabel
    direction: UP
    visibilityPercentage: 60
    timeout: 120000
    centerElement: true
- extendedWaitUntil:
    visible:
      id: text.subscription.qa.actionLabel
      text: "Restore completed"
    timeout: 180000
- scrollUntilVisible:
    element:
      id: text.subscription.qa.status
    direction: UP
    visibilityPercentage: 60
    timeout: 30000
    centerElement: true
- assertVisible:
    id: text.subscription.qa.status
    text: ".*plus / active.*"
