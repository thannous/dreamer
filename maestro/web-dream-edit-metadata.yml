url: "http://localhost:8081"
---
- runFlow: subflows/web-select-existing-mock-profile.yml
- assertVisible: "mock\\.existing@dreamer\\.app"
- runFlow:
    when:
      visible:
        id: "tab.journal"
    commands:
      - tapOn:
          id: "tab.journal"
- runFlow:
    when:
      visible: "Journal"
    commands:
      - tapOn: "Journal"
- waitForAnimationToEnd
- tapOn: "The Infinite Library"
- waitForAnimationToEnd
- assertVisible: "The Infinite Library"
- scrollUntilVisible:
    element:
      id: "btn.editMetadata"
    direction: DOWN
    visibilityPercentage: 20
    centerElement: true
- tapOn:
    id: "btn.editMetadata"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: "chip.type.Nightmare"
    direction: UP
    visibilityPercentage: 20
    centerElement: true
- tapOn:
    id: "chip.type.Nightmare"
- scrollUntilVisible:
    element:
      id: "btn.editMetadata"
    direction: DOWN
    visibilityPercentage: 20
    centerElement: true
- tapOn:
    id: "btn.editMetadata"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- waitForAnimationToEnd
- assertVisible: "Nightmare"
- tapOn:
    id: "btn.navigateJournal"
- waitForAnimationToEnd
- assertVisible: "(Dream Journey|Voyage onirique|Viaje on.rico)"
- runFlow: subflows/web-select-existing-mock-profile.yml
- assertVisible: "mock\\.existing@dreamer\\.app"
- runFlow:
    when:
      visible:
        id: "tab.journal"
    commands:
      - tapOn:
          id: "tab.journal"
- runFlow:
    when:
      visible: "Journal"
    commands:
      - tapOn: "Journal"
- waitForAnimationToEnd
- assertVisible: "The Infinite Library"
