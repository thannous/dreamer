# Update the appId if your build uses a different bundle identifier.
appId: com.tanuki75.noctalia
---
- runFlow: subflows/open-mock-app.yml
- runFlow:
      when:
          visible:
              id: screen.journal
      commands:
          - runFlow:
                when:
                    visible:
                        id: btn.addDream
                commands:
                    - tapOn:
                          id: btn.addDream
          - runFlow:
                when:
                    visible:
                        id: tab.addDream
                commands:
                    - tapOn:
                          id: tab.addDream
- assertVisible:
      id: screen.recording
- runFlow: subflows/go-to-journal-phone.yml
- assertVisible:
      id: screen.journal
- runFlow: subflows/ensure-journal-search-visible.yml
- tapOn:
      id: input.searchDreams
- inputText: Lucide
- eraseText
- pressKey: back
- runFlow:
      when:
          visible:
              id: btn.addDream
      commands:
          - tapOn:
                id: btn.addDream
- runFlow:
      when:
          visible:
              id: tab.addDream
      commands:
          - tapOn:
                id: tab.addDream
- extendedWaitUntil:
      visible:
          id: screen.recording
      timeout: 20000
- assertVisible:
      id: screen.recording
