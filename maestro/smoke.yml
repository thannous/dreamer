# Update the appId if your build uses a different bundle identifier.
appId: com.tanuki75.noctalia
---
- runFlow: subflows/open-mock-app.yml
- runFlow:
      when:
          visible:
              id: screen.journal
      commands:
          - tapOn:
                id: btn.addDream
          - waitForAnimationToEnd
- assertVisible:
      id: screen.recording
- runFlow: subflows/go-to-journal-phone.yml
- assertVisible:
      id: screen.journal
- runFlow: subflows/ensure-journal-search-visible.yml
- tapOn:
      id: input.searchDreams
- inputText: Lucide
- eraseText
- pressKey: back
- tapOn:
      id: btn.addDream
- assertVisible:
      id: screen.recording
