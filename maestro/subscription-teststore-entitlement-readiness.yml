# Non-transactional proof that the exact Google QA account keeps its Test Store
# entitlement after the purchase flow and a fresh app launch.
appId: com.tanuki75.noctalia
name: Test Store entitlement persistence
---
- runFlow: subflows/open-release-app-preserve-state.yml
- openLink: noctalia://settings
- extendedWaitUntil:
    visible: "Settings|Paramètres|Configuración|Ajustes"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Account|Compte|Cuenta|Konto"
    direction: UP
    visibilityPercentage: 40
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "${QA_EMAIL_REGEX}"
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
- assertVisible: "${QA_EMAIL_REGEX}"
- scrollUntilVisible:
    element:
      id: screen.subscription.qaLab
    direction: DOWN
    visibilityPercentage: 30
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.mode
    text: "RevenueCat Test Store"
- extendedWaitUntil:
    visible:
      id: text.subscription.qa.packages
      text: "2"
    timeout: 120000
- scrollUntilVisible:
    element:
      id: text.subscription.qa.status
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
    centerElement: true
- assertVisible:
    id: text.subscription.qa.status
    text: ".*plus / active.*"
