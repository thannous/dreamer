url: "http://localhost:8081"
---
- runFlow: subflows/web-select-existing-mock-profile.yml
- tapOn: "Journal"
- waitForAnimationToEnd
- tapOn: "The Infinite Library"
- waitForAnimationToEnd
- assertVisible: "The Infinite Library"
- scrollUntilVisible:
    element:
      id: "btn.dream.share"
    direction: DOWN
    visibilityPercentage: 60
    centerElement: true
- tapOn:
    id: "btn.dream.share"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- waitForAnimationToEnd
- assertVisible: "(Share your dream|Partager ton r.ve|Comparte tu sue.o)"
- runFlow:
    when:
      visible:
        id: "btn.share.copy"
    commands:
      - tapOn:
          id: "btn.share.copy"
      - waitForAnimationToEnd
      - assertVisible: "(Copied!|Copi.!|Copiado)"
- tapOn:
    id: "btn.share.close"
- waitForAnimationToEnd
