appId: com.tanuki75.noctalia
---
# Manual guarded Test Store purchase flow using native Google Sign-In.
# Run only through scripts/run-subscription-teststore-purchase.js with explicit approval env.

- runFlow: subflows/open-release-app-preserve-state.yml
- openLink: noctalia://settings
- extendedWaitUntil:
    visible: "Settings|Paramètres|Configuración|Ajustes"
    timeout: 30000

- swipe:
    direction: DOWN
- swipe:
    direction: DOWN
- runFlow:
    when:
      notVisible:
        id: text.auth.email
    commands:
      - scrollUntilVisible:
          element:
            text: "Continue with Google|Continuer avec Google|Continuar con Google|Mit Google fortfahren|Continua con Google"
          direction: DOWN
          visibilityPercentage: 70
          timeout: 30000
      - tapOn:
          text: "Continue with Google|Continuer avec Google|Continuar con Google|Mit Google fortfahren|Continua con Google"
      - tapOn:
          text: "${QA_EMAIL_REGEX}"
- extendedWaitUntil:
    visible:
      id: text.auth.email
      text: "${QA_EMAIL_REGEX}"
    timeout: 60000
- scrollUntilVisible:
    element:
      text: "Subscription QA Lab"
    direction: DOWN
    visibilityPercentage: 40
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.mode
    text: "RevenueCat Test Store"

- scrollUntilVisible:
    element:
      id: "btn.subscription.qa.scenario.${QA_PLAN}"
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
- tapOn:
    id: "btn.subscription.qa.scenario.${QA_PLAN}"
- extendedWaitUntil:
    visible: "TEST VALID PURCHASE"
    timeout: 30000
- tapOn: "TEST VALID PURCHASE"
- extendedWaitUntil:
    visible:
      id: text.subscription.qa.actionLabel
      text: ".*${QA_PLAN} purchase completed.*"
    timeout: 120000
- scrollUntilVisible:
    element:
      id: text.subscription.qa.status
    direction: UP
    visibilityPercentage: 60
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.status
    text: ".*plus / active.*"

- scrollUntilVisible:
    element:
      id: btn.subscription.qa.refresh
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
- tapOn:
    id: btn.subscription.qa.refresh
- extendedWaitUntil:
    visible:
      id: text.subscription.qa.actionLabel
      text: "Refresh completed"
    timeout: 60000
- scrollUntilVisible:
    element:
      id: text.subscription.qa.status
    direction: UP
    visibilityPercentage: 60
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.status
    text: ".*plus / active.*"
