appId: com.tanuki75.noctalia
---
# Manual guarded Test Store purchase flow using native Google Sign-In.
# Run only through scripts/run-subscription-teststore-purchase.js with explicit approval env.

- runFlow: subflows/open-release-app-preserve-state.yml
- openLink: noctalia://settings
- extendedWaitUntil:
    visible: "Settings|Paramètres|Configuración|Ajustes"
    timeout: 30000

# The guarded purchase never changes identity. A separate non-transactional
# prerequisite selects the Google QA account; this flow fails closed unless
# that exact account is already visible in the app.
- scrollUntilVisible:
    element:
      text: "Account|Compte|Cuenta|Konto"
    direction: UP
    visibilityPercentage: 40
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "${QA_EMAIL_REGEX}"
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
- assertVisible: "${QA_EMAIL_REGEX}"
- scrollUntilVisible:
    element:
      text: "Subscription QA Lab"
    direction: DOWN
    visibilityPercentage: 40
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.mode
    text: "RevenueCat Test Store"

# A timed-out attempt is ambiguous. Fail closed if this exact product is
# already active so a retry cannot create another Test Store transaction.
- scrollUntilVisible:
    element:
      id: text.subscription.qa.product
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
- assertNotVisible:
    id: text.subscription.qa.product
    text: "(?i)^${QA_PRODUCT_ID}$"

- scrollUntilVisible:
    element:
      id: "btn.subscription.qa.scenario.${QA_PLAN}"
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
    centerElement: true
- extendedWaitUntil:
    visible:
      id: "btn.subscription.qa.scenario.${QA_PLAN}"
      enabled: true
    timeout: 120000
- tapOn:
    id: "btn.subscription.qa.scenario.${QA_PLAN}"
- extendedWaitUntil:
    visible: "^Test Store Purchase$"
    timeout: 30000
- extendedWaitUntil:
    visible:
      id: "^android:id/button1$"
      text: "(?i)^Test valid Purchase$"
      enabled: true
    timeout: 30000
- tapOn:
    id: "^android:id/button1$"
- extendedWaitUntil:
    notVisible:
      id: "^android:id/button1$"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: text.subscription.qa.actionLabel
      text: ".*${QA_PLAN} purchase completed.*"
    timeout: 180000
- scrollUntilVisible:
    element:
      id: text.subscription.qa.status
    direction: UP
    visibilityPercentage: 60
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.status
    text: ".*plus / active.*"
