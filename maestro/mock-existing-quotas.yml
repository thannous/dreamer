# Validate quota + stats numbers for the mock existing user profile
appId: com.tanuki75.noctalia
---
- runFlow: subflows/open-mock-app.yml
- runFlow: subflows/select-existing-mock-profile.yml
- scrollUntilVisible:
    element:
      id: quota.explorationValue
    direction: DOWN
    speed: 30
    visibilityPercentage: 60
    centerElement: true
    timeout: 30000
- assertVisible:
    id: quota.analysisValue
- assertVisible: "2 / 3"
- assertVisible:
    id: quota.explorationValue
- assertVisible: "2 / 2"
- tapOn:
    id: tab.stats
- waitForAnimationToEnd
- swipe:
    start: 50%, 78%
    end: 50%, 28%
- swipe:
    start: 50%, 78%
    end: 50%, 28%
- swipe:
    start: 50%, 78%
    end: 50%, 28%
- assertVisible:
    id: stats.dreamsWithChat
- assertVisible:
    id: stats.analyzedDreams
- assertVisible:
    id: stats.totalChats
- assertVisible: "2"
