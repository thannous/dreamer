# Validate quota + stats numbers for the mock existing user profile
appId: com.tanuki75.noctalia
---
- runFlow: subflows/open-mock-app.yml
- runFlow:
    when:
      visible:
        id: btn.navigateJournal
    commands:
      - tapOn:
          id: btn.navigateJournal
      - waitForAnimationToEnd
- tapOn:
    text: "(Settings|Param.tres|Ajustes)"
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: btn.mockProfile.existing
    direction: DOWN
- tapOn:
    id: btn.mockProfile.existing
- waitForAnimationToEnd
- assertVisible: "mock.existing@dreamer.app"
- scrollUntilVisible:
    element:
      id: quota.explorationValue
    direction: DOWN
- assertVisible: "Dream analyses: 2 / 3|Analyses de rêves: 2 / 3|Análisis de sueños: 2 / 3"
- assertVisible: "Dream explorations: 2 / 2|Explorations de rêves: 2 / 2|Exploraciones de sueños: 2 / 2"
- tapOn:
    text: "(Stats|Estad.sticas)"
- waitForAnimationToEnd
- swipe:
    start: 50%, 78%
    end: 50%, 28%
- swipe:
    start: 50%, 78%
    end: 50%, 28%
- swipe:
    start: 50%, 78%
    end: 50%, 28%
- assertVisible: "Dreams with Chat: 2|Rêves avec discussion: 2|Sueños con chat: 2"
- assertVisible: "Analyzed Dreams: 2|Rêves analysés: 2|Sueños analizados: 2"
- assertVisible: "Total Chats: 2|Total des discussions: 2|Total de chats: 2"
