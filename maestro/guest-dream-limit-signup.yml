appId: com.tanuki75.noctalia
---
# Guest dream limit with signup - third dream saved to account on signup
- runFlow: subflows/open-mock-app.yml
- runFlow: subflows/reset-mock-state.yml

# Guest dream 1 - save successfully as guest
- runFlow: subflows/ensure-recording-text.yml
- tapOn:
    id: input.dreamTranscript
- inputText: "Guest Limit Dream 1"
- tapOn:
    id: btn.saveDream
- waitForAnimationToEnd
- tapOn:
    id: btn.firstDream.dismiss

# Guest dream 2 - save successfully as guest and use analyze prompt to reach detail
- runFlow: subflows/ensure-recording-text.yml
- tapOn:
    id: input.dreamTranscript
- inputText: "Guest Limit Dream 2"
- tapOn:
    id: btn.saveDream
- waitForAnimationToEnd
- assertVisible:
    id: text.analyzePromptTitle
- tapOn:
    id: btn.analyzePrompt.analyze
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: btn.exploreDream
    direction: DOWN
- assertVisible:
    id: btn.exploreDream

# Return to the recording screen for the third dream
- tapOn:
    id: btn.navigateJournal
- tapOn:
    id: btn.addDream

# Guest dream 3 - should be blocked by guest limit bottom sheet
- runFlow: subflows/ensure-recording-text.yml
- tapOn:
    id: input.dreamTranscript
- inputText: "Guest Limit Dream 3"
- tapOn:
    id: btn.saveDream
- assertVisible: "Limit reached|Limite atteinte|Límite alcanzado"
- tapOn:
    id: btn.guestLimit.cta

# Create account via email/password
- scrollUntilVisible:
    element:
      id: input.auth.password
    direction: DOWN
- tapOn:
    id: input.auth.password
- inputText: "guestpass"
- tapOn:
    id: input.auth.email
- inputText: "guest.limit+signup@dreamer.test"
- pressKey: back
- scrollUntilVisible:
    element:
      id: btn.auth.signUp
    direction: DOWN
- tapOn:
    id: btn.auth.signUp
- tapOn: "OK|D'accord|Aceptar"
- tapOn:
    id: btn.navigateJournal
- waitForAnimationToEnd
- assertVisible:
    id: screen.journal
- assertVisible: "Guest Limit Dream 1"
- assertVisible: "Guest Limit Dream 3"
