appId: com.tanuki75.noctalia
---
# Manual account-switch proof for Test Store/RevenueCat.
# Precondition: start from a currently signed-in Plus account.
# The flow signs out, signs into a second real email/password account, refreshes RevenueCat,
# and verifies the Plus entitlement does not leak to that second account.

- runFlow: subflows/open-release-app-preserve-state.yml
- openLink: noctalia://settings
- extendedWaitUntil:
    visible: "Settings|Paramètres|Configuración|Ajustes"
    timeout: 30000

- extendedWaitUntil:
    visible:
      id: text.auth.email
      text: "${QA_PAID_EMAIL_REGEX}"
    timeout: 30000

- scrollUntilVisible:
    element:
      text: "Subscription QA Lab"
    direction: DOWN
    visibilityPercentage: 40
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.mode
    text: "RevenueCat Test Store"
- scrollUntilVisible:
    element:
      id: text.subscription.qa.status
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.status
    text: ".*plus / active.*"

- scrollUntilVisible:
    element:
      id: btn.auth.signOut
    direction: UP
    visibilityPercentage: 70
    timeout: 30000
- tapOn:
    id: btn.auth.signOut
- extendedWaitUntil:
    visible: "Continue with Google|Continuer avec Google|Continuar con Google|Mit Google fortfahren|Continua con Google"
    timeout: 60000

- scrollUntilVisible:
    element:
      id: input.auth.email
    direction: DOWN
    visibilityPercentage: 70
    timeout: 30000
- tapOn:
    id: input.auth.email
- eraseText
- inputText: ${QA_SWITCH_FREE_EMAIL}
- runFlow:
    when:
      visible: "Use your saved password.*"
    commands:
      - tapOn:
          text: "No thanks"
          optional: true
- pressKey: back
- tapOn:
    id: input.auth.email
- eraseText
- inputText: ${QA_SWITCH_FREE_EMAIL}
- pressKey: back
- scrollUntilVisible:
    element:
      id: input.auth.password
    direction: DOWN
    visibilityPercentage: 70
    timeout: 30000
- tapOn:
    id: input.auth.password
- eraseText
- inputText: ${QA_SWITCH_FREE_PASSWORD}
- runFlow:
    when:
      visible: "Use your saved password.*"
    commands:
      - tapOn:
          text: "No thanks"
          optional: true
- pressKey: back
- scrollUntilVisible:
    element:
      id: btn.auth.signIn
    direction: DOWN
    visibilityPercentage: 70
    timeout: 30000
- tapOn:
    id: btn.auth.signIn
- extendedWaitUntil:
    visible:
      id: text.auth.email
      text: "${QA_SWITCH_FREE_EMAIL_REGEX}"
    timeout: 45000

- scrollUntilVisible:
    element:
      text: "Subscription QA Lab"
    direction: DOWN
    visibilityPercentage: 40
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.mode
    text: "RevenueCat Test Store"
- scrollUntilVisible:
    element:
      id: btn.subscription.qa.refresh
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
- tapOn:
    id: btn.subscription.qa.refresh
- extendedWaitUntil:
    visible:
      id: text.subscription.qa.actionLabel
      text: "Refresh completed"
    timeout: 60000
- scrollUntilVisible:
    element:
      id: text.subscription.qa.status
    direction: UP
    visibilityPercentage: 60
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.status
- assertVisible:
    id: text.subscription.qa.status
    text: ".*free / inactive.*"
- assertNotVisible: "Noctalia Plus is active"
- assertNotVisible: "plus / active"
