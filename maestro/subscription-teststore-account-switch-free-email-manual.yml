appId: com.tanuki75.noctalia
---
# Manual account-switch proof for Test Store/RevenueCat.
# Precondition: start from a currently signed-in Plus account.
# The flow signs out, signs into a second real email/password account, refreshes RevenueCat,
# and verifies the Plus entitlement does not leak to that second account.

- runFlow: subflows/open-release-app-preserve-state.yml
- openLink: noctalia://settings
- extendedWaitUntil:
    visible: "Settings|Paramètres|Configuración|Ajustes|Impostazioni|Einstellungen"
    timeout: 30000

# Reset to the account card before checking the paid identity. Readiness flows
# can otherwise leave settings scrolled near the bottom of the QA Lab.
- scrollUntilVisible:
    element:
      text: "Account|Compte|Cuenta|Konto"
    direction: UP
    visibilityPercentage: 40
    timeout: 30000
- scrollUntilVisible:
    element:
      id: text.auth.email
      text: "${QA_PAID_EMAIL_REGEX}"
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
- assertVisible:
    id: text.auth.email
    text: "${QA_PAID_EMAIL_REGEX}"

- scrollUntilVisible:
    element:
      id: screen.subscription.qaLab
    direction: DOWN
    visibilityPercentage: 30
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.mode
    text: "RevenueCat Test Store"
- scrollUntilVisible:
    element:
      id: text.subscription.qa.status
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
    centerElement: true
- assertVisible:
    id: text.subscription.qa.status
    text: ".*plus / active.*"

- scrollUntilVisible:
    element:
      id: btn.auth.signOut
    direction: UP
    visibilityPercentage: 60
    timeout: 30000
    centerElement: true
- extendedWaitUntil:
    visible:
      id: btn.auth.signOut
      enabled: true
    timeout: 30000
- tapOn:
    id: btn.auth.signOut
- extendedWaitUntil:
    visible:
      id: btn.auth.google
      enabled: true
    timeout: 120000

- scrollUntilVisible:
    element:
      text: "Account|Compte|Cuenta|Konto"
    direction: UP
    visibilityPercentage: 40
    timeout: 30000

- scrollUntilVisible:
    element:
      id: input.auth.email
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
    centerElement: true
- tapOn:
    id: input.auth.email
- eraseText
- inputText: ${QA_SWITCH_FREE_EMAIL}
- runFlow:
    when:
      visible: "Use your saved password.*"
    commands:
      - tapOn:
          text: "No thanks"
          optional: true
- pressKey: back
- tapOn:
    id: input.auth.email
- eraseText
- inputText: ${QA_SWITCH_FREE_EMAIL}
- pressKey: back
- scrollUntilVisible:
    element:
      id: input.auth.password
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
    centerElement: true
- tapOn:
    id: input.auth.password
- eraseText
- inputText: ${QA_SWITCH_FREE_PASSWORD}
- runFlow:
    when:
      visible: "Use your saved password.*"
    commands:
      - tapOn:
          text: "No thanks"
          optional: true
- pressKey: back
- scrollUntilVisible:
    element:
      id: btn.auth.signIn
    direction: DOWN
    visibilityPercentage: 60
    timeout: 30000
    centerElement: true
- extendedWaitUntil:
    visible:
      id: btn.auth.signIn
      enabled: true
    timeout: 30000
- tapOn:
    id: btn.auth.signIn
- runFlow:
    when:
      visible: "Save password to Google Password Manager.*"
    commands:
      - tapOn:
          text: "Not now"
- extendedWaitUntil:
    visible:
      id: text.auth.email
      text: "${QA_SWITCH_FREE_EMAIL_REGEX}"
    timeout: 60000

# Reset the signed-in card and reassert the exact second identity before
# touching RevenueCat state.
- scrollUntilVisible:
    element:
      text: "Account|Compte|Cuenta|Konto"
    direction: UP
    visibilityPercentage: 40
    timeout: 60000
- scrollUntilVisible:
    element:
      id: text.auth.email
      text: "${QA_SWITCH_FREE_EMAIL_REGEX}"
    direction: DOWN
    visibilityPercentage: 60
    timeout: 60000
    centerElement: true
- assertVisible:
    id: text.auth.email
    text: "${QA_SWITCH_FREE_EMAIL_REGEX}"

- scrollUntilVisible:
    element:
      id: screen.subscription.qaLab
    direction: DOWN
    visibilityPercentage: 30
    timeout: 30000
- assertVisible:
    id: text.subscription.qa.mode
    text: "RevenueCat Test Store"
- extendedWaitUntil:
    visible:
      id: text.subscription.qa.status
      text: ".*free / inactive.*"
    timeout: 180000
- scrollUntilVisible:
    element:
      id: text.subscription.qa.status
    direction: UP
    visibilityPercentage: 60
    timeout: 30000
    centerElement: true
- assertVisible:
    id: text.subscription.qa.status
- assertVisible:
    id: text.subscription.qa.status
    text: ".*free / inactive.*"
- assertNotVisible: "Noctalia Plus is active"
- assertNotVisible: "plus / active"
