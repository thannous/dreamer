url: "http://localhost:8081"
---
- runFlow: subflows/web-select-existing-mock-profile.yml
- tapOn: "Journal"
- waitForAnimationToEnd
- tapOn: "Garden in the Clouds"
- waitForAnimationToEnd
- assertVisible: "Garden in the Clouds"
- scrollUntilVisible:
    element:
      id: "btn.dream.delete"
    direction: DOWN
    visibilityPercentage: 60
    centerElement: true
- tapOn:
    id: "btn.dream.delete"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- waitForAnimationToEnd
- assertVisible: "(Delete dream|Delete Dream|Supprimer le r.ve|Eliminar sue.o)"
- tapOn: "(Delete|Supprimer|Eliminar)"
- waitForAnimationToEnd
- assertVisible: "(Dream Journey|Voyage onirique|Viaje on.rico)"
