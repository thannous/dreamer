# Verify dream detail CTA labels for analyzed vs explored states (mock existing user)
appId: com.tanuki75.noctalia
---
- runFlow: subflows/open-mock-app.yml
- runFlow: subflows/select-existing-mock-profile.yml
- tapOn:
      id: btn.mockNav.journal
- extendedWaitUntil:
      visible:
          id: screen.journal
      timeout: 30000
- runFlow: subflows/clear-journal-filters.yml

# Un-tagged as analyzed -> primary CTA shows Analyze dream
- runFlow: subflows/ensure-journal-search-visible.yml
- tapOn:
      id: input.searchDreams
- eraseText
- inputText: "The Shadowy Pursuer"
- hideKeyboard
- extendedWaitUntil:
      visible: "The Shadowy Pursuer"
      timeout: 10000
- assertVisible: "The Shadowy Pursuer"
- tapOn:
      point: "50%,56%"
- scrollUntilVisible:
      element:
          id: btn.dream.primaryCta
      direction: DOWN
- assertVisible: "Analyze dream"
- tapOn:
      id: btn.navigateJournal
- extendedWaitUntil:
      visible:
          id: screen.journal
      timeout: 30000

# Analyzed but not explored -> Explore dream further
- runFlow: subflows/ensure-journal-search-visible.yml
- tapOn:
      id: input.searchDreams
- eraseText
- inputText: "The Infinite Library"
- hideKeyboard
- extendedWaitUntil:
      visible: "The Infinite Library"
      timeout: 10000
- assertVisible: "The Infinite Library"
- tapOn:
      point: "50%,56%"
- scrollUntilVisible:
      element:
          id: btn.dream.primaryCta
      direction: DOWN
- assertVisible: "Explore dream further"
- tapOn:
      id: btn.navigateJournal
- extendedWaitUntil:
      visible:
          id: screen.journal
      timeout: 30000

# Explored -> Continue analyzing
- runFlow: subflows/ensure-journal-search-visible.yml
- tapOn:
      id: input.searchDreams
- eraseText
- inputText: "Ocean of Stars"
- hideKeyboard
- extendedWaitUntil:
      visible: "Ocean of Stars"
      timeout: 10000
- assertVisible: "Ocean of Stars"
- tapOn:
      point: "50%,56%"
- scrollUntilVisible:
      element:
          id: btn.dream.primaryCta
      direction: DOWN
- assertVisible: "Continue analyzing"
