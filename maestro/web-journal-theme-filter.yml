url: "http://localhost:8081"
---
- runFlow: subflows/web-select-existing-mock-profile.yml
- tapOn: "Journal"
- waitForAnimationToEnd
- assertVisible: "(Theme|Th.me)"
- tapOn: "(Theme|Th.me)"
- waitForAnimationToEnd
- assertVisible: "(Select Theme|Sélectionner un thème|Seleccionar tema)"
- tapOn: "(Mystical|Mystique)"
- waitForAnimationToEnd
- assertVisible: "The Infinite Library"
- runFlow:
    when:
      visible:
        id: "btn.clearFilters"
    commands:
      - tapOn:
          id: "btn.clearFilters"
      - waitForAnimationToEnd
