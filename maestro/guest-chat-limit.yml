# Guest chat limit: reach the per-dream message cap as a guest
appId: com.tanuki75.noctalia
---
- runFlow: subflows/open-mock-app.yml
- runFlow: subflows/reset-mock-state.yml
- runFlow: subflows/ensure-recording-text.yml
- tapOn:
    id: input.dreamTranscript
- inputText: "Guest Chat Limit"
- tapOn:
    id: btn.saveDream
- waitForAnimationToEnd
- assertVisible:
    id: text.firstDream.title
- tapOn:
    id: btn.firstDream.analyze
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      id: btn.exploreDream
    direction: DOWN
- tapOn:
    id: btn.exploreDream
- tapOn:
    id: btn.dreamCategory.symbols
- assertVisible:
    id: chat.input.message
- repeat:
    times: 9
    commands:
      - runFlow:
          file: subflows/send-chat-message.yml
          env:
            MESSAGE: "Hello from guest"
- runFlow:
    file: subflows/send-chat-message.yml
    env:
      MESSAGE: "Final guest message"
- pressKey: back
- assertVisible:
    id: text.chat.limit
- assertVisible: "You've reached the message limit for this dream. Upgrade to continue the conversation."
