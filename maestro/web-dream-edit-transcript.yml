url: "http://localhost:8081"
---
- runFlow: subflows/web-select-existing-mock-profile.yml
- tapOn: "Journal"
- waitForAnimationToEnd
- tapOn: "The Infinite Library"
- waitForAnimationToEnd
- assertVisible: "The Infinite Library"
- scrollUntilVisible:
    element:
      id: "btn.editTranscript"
    direction: DOWN
    visibilityPercentage: 60
    centerElement: true
- tapOn:
    id: "btn.editTranscript"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- waitForAnimationToEnd
- assertVisible:
    id: "input.dreamTranscript"
- tapOn:
    id: "input.dreamTranscript"
- eraseText
- inputText: "E2E transcript update."
- scrollUntilVisible:
    element:
      id: "btn.editTranscript"
    direction: DOWN
    visibilityPercentage: 60
    centerElement: true
- tapOn:
    id: "btn.editTranscript"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 500
- waitForAnimationToEnd
- runFlow:
    when:
      visible: "(Update this dream\\?|Mettre . jour le r.ve .*\\?)"
    commands:
      - tapOn: "(Later|Plus tard)"
      - waitForAnimationToEnd
- assertVisible: "E2E transcript update."
