<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <title>Flying dream reflection matrix</title><desc>Explore freedom, control, escape and fear of falling through emotion and waking context.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#100c31"/><stop offset="1" stop-color="#43316b"/></linearGradient></defs><rect width="1200" height="900" rx="48" fill="url(#bg)"/>
  <text x="80" y="105" fill="#faf5ff" font-family="Arial, sans-serif" font-size="48" font-weight="700">How did the flight feel?</text><text x="80" y="153" fill="#cec4e7" font-family="Arial, sans-serif" font-size="24">Use emotion, control and waking context before choosing an interpretation.</text>
  <g font-family="Arial, sans-serif"><g transform="translate(80 220)"><rect width="495" height="245" rx="28" fill="#211944" stroke="#9b82e0"/><text x="34" y="58" fill="#ffb6a4" font-size="25" font-weight="700">FREEDOM</text><text x="34" y="106" fill="#fff" font-size="23">Light, open, effortless?</text><text x="34" y="145" fill="#d8cfeb" font-size="21">Where do you want more space</text><text x="34" y="177" fill="#d8cfeb" font-size="21">or possibility while awake?</text></g><g transform="translate(625 220)"><rect width="495" height="245" rx="28" fill="#211944" stroke="#9b82e0"/><text x="34" y="58" fill="#ffb6a4" font-size="25" font-weight="700">CONTROL</text><text x="34" y="106" fill="#fff" font-size="23">Could you steer or change height?</text><text x="34" y="145" fill="#d8cfeb" font-size="21">What feels manageable—or hard</text><text x="34" y="177" fill="#d8cfeb" font-size="21">to direct—in daily life?</text></g><g transform="translate(80 515)"><rect width="495" height="245" rx="28" fill="#211944" stroke="#9b82e0"/><text x="34" y="58" fill="#ffb6a4" font-size="25" font-weight="700">ESCAPE</text><text x="34" y="106" fill="#fff" font-size="23">Were you leaving danger or pressure?</text><text x="34" y="145" fill="#d8cfeb" font-size="21">What boundary, demand or conflict</text><text x="34" y="177" fill="#d8cfeb" font-size="21">was present recently?</text></g><g transform="translate(625 515)"><rect width="495" height="245" rx="28" fill="#211944" stroke="#9b82e0"/><text x="34" y="58" fill="#ffb6a4" font-size="25" font-weight="700">FEAR OF FALLING</text><text x="34" y="106" fill="#fff" font-size="23">Unstable, too high or losing lift?</text><text x="34" y="145" fill="#d8cfeb" font-size="21">Where do confidence or support</text><text x="34" y="177" fill="#d8cfeb" font-size="21">feel uncertain right now?</text></g></g>
  <text x="600" y="830" text-anchor="middle" fill="#d8cfeb" font-family="Arial, sans-serif" font-size="22">A flying dream can hold several themes at once; your felt experience is the starting point.</text>
</svg>
