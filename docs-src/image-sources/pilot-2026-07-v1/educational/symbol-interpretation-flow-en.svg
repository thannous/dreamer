<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <title>Four-step dream symbol reflection process</title><desc>Move from the image to emotion, personal context and recurring patterns.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#100a2a"/><stop offset="1" stop-color="#452658"/></linearGradient><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L9 3 0 6Z" fill="#d9a0c9"/></marker></defs><rect width="1200" height="900" rx="48" fill="url(#bg)"/>
  <text x="85" y="105" fill="#fff7fb" font-family="Arial, sans-serif" font-size="47" font-weight="700">How to explore a dream symbol</text><text x="85" y="153" fill="#d1c2e2" font-family="Arial, sans-serif" font-size="24">Use a dictionary as a prompt, then return to the dreamer’s own experience.</text>
  <g stroke="#d9a0c9" stroke-width="6" marker-end="url(#a)"><path d="M310 440h65"/><path d="M575 440h65"/><path d="M840 440h65"/></g>
  <g font-family="Arial, sans-serif"><g transform="translate(65 285)"><rect width="245" height="310" rx="30" fill="#211640" stroke="#9a80d3"/><circle cx="122" cy="70" r="38" fill="#ffb4a2"/><path d="M96 70c15-25 37-25 52 0-15 25-37 25-52 0z" fill="none" stroke="#2b1630" stroke-width="6"/><text x="28" y="150" fill="#ffb4a2" font-size="20" font-weight="700">1 · IMAGE</text><text x="28" y="193" fill="#fff" font-size="23">What appeared?</text><text x="28" y="231" fill="#d7cbe7" font-size="20">Describe it before</text><text x="28" y="261" fill="#d7cbe7" font-size="20">assigning meaning.</text></g><g transform="translate(330 285)"><rect width="245" height="310" rx="30" fill="#211640" stroke="#9a80d3"/><circle cx="122" cy="70" r="38" fill="#ffb4a2"/><path d="M122 91c-42-26-28-62-6-48 4 3 6 8 6 8s3-5 7-8c23-14 36 22-7 48z" fill="#2b1630"/><text x="28" y="150" fill="#ffb4a2" font-size="20" font-weight="700">2 · EMOTION</text><text x="28" y="193" fill="#fff" font-size="23">How did it feel?</text><text x="28" y="231" fill="#d7cbe7" font-size="20">Name the emotion</text><text x="28" y="261" fill="#d7cbe7" font-size="20">and its intensity.</text></g><g transform="translate(595 285)"><rect width="245" height="310" rx="30" fill="#211640" stroke="#9a80d3"/><circle cx="122" cy="70" r="38" fill="#ffb4a2"/><path d="M102 89V58l20-15 20 15v31h-15V69h-10v20z" fill="#2b1630"/><text x="28" y="150" fill="#ffb4a2" font-size="20" font-weight="700">3 · CONTEXT</text><text x="28" y="193" fill="#fff" font-size="23">What is personal?</text><text x="28" y="231" fill="#d7cbe7" font-size="20">Connect recent events,</text><text x="28" y="261" fill="#d7cbe7" font-size="20">memories and culture.</text></g><g transform="translate(860 285)"><rect width="275" height="310" rx="30" fill="#211640" stroke="#9a80d3"/><circle cx="137" cy="70" r="38" fill="#ffb4a2"/><path d="M110 72c0-25 40-25 40 0s-40 25-40 0m40 0c0-25 38-25 38 0" fill="none" stroke="#2b1630" stroke-width="6"/><text x="28" y="150" fill="#ffb4a2" font-size="20" font-weight="700">4 · PATTERN</text><text x="28" y="193" fill="#fff" font-size="23">Does it recur?</text><text x="28" y="231" fill="#d7cbe7" font-size="20">Compare several dreams</text><text x="28" y="261" fill="#d7cbe7" font-size="20">before drawing a theme.</text></g></g>
  <rect x="145" y="690" width="910" height="105" rx="24" fill="#17102f" stroke="#6d598e"/><text x="600" y="735" text-anchor="middle" fill="#ffcabd" font-family="Arial, sans-serif" font-size="23" font-weight="700">No symbol has one universal meaning</text><text x="600" y="772" text-anchor="middle" fill="#d0c4e0" font-family="Arial, sans-serif" font-size="21">Use possible associations as questions, not as a diagnosis or prediction.</text>
</svg>
