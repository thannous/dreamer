<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <title>Rutina inicial para sueños lúcidos</title>
  <desc>Cuatro pasos: tests de realidad, diario de sueños, ensayo MILD y práctica WBTB selectiva.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#100b2b"/><stop offset="1" stop-color="#42245c"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-opacity=".28"/></filter></defs>
  <rect width="1200" height="900" rx="48" fill="url(#bg)"/><circle cx="1040" cy="120" r="170" fill="#ffb6a3" opacity=".08"/><circle cx="130" cy="790" r="220" fill="#9b79ff" opacity=".08"/>
  <text x="90" y="105" fill="#f8f1ff" font-family="Arial, sans-serif" font-size="48" font-weight="700">Rutina inicial para sueños lúcidos</text><text x="90" y="155" fill="#cdbfe6" font-family="Arial, sans-serif" font-size="25">Refuerza el recuerdo y la atención antes de intentar controlar el sueño.</text>
  <g font-family="Arial, sans-serif" filter="url(#s)">
    <g transform="translate(80 245)"><rect width="235" height="390" rx="28" fill="#211742" stroke="#8e76d9"/><circle cx="48" cy="54" r="27" fill="#ffad9d"/><text x="48" y="63" text-anchor="middle" fill="#211128" font-size="26" font-weight="700">1</text><text x="30" y="125" fill="#fff" font-size="28" font-weight="700">Tests de realidad</text><text x="30" y="177" fill="#d8cde9" font-size="22"><tspan x="30">Párate varias veces</tspan><tspan x="30" dy="34">al día y pregúntate</tspan><tspan x="30" dy="34">si estás soñando.</tspan></text></g>
    <g transform="translate(350 245)"><rect width="235" height="390" rx="28" fill="#211742" stroke="#8e76d9"/><circle cx="48" cy="54" r="27" fill="#ffad9d"/><text x="48" y="63" text-anchor="middle" fill="#211128" font-size="26" font-weight="700">2</text><text x="30" y="125" fill="#fff" font-size="28" font-weight="700">Diario de sueños</text><text x="30" y="177" fill="#d8cde9" font-size="22"><tspan x="30">Anota fragmentos al</tspan><tspan x="30" dy="34">despertar. Detecta</tspan><tspan x="30" dy="34">señales recurrentes.</tspan></text></g>
    <g transform="translate(620 245)"><rect width="235" height="390" rx="28" fill="#211742" stroke="#8e76d9"/><circle cx="48" cy="54" r="27" fill="#ffad9d"/><text x="48" y="63" text-anchor="middle" fill="#211128" font-size="26" font-weight="700">3</text><text x="30" y="125" fill="#fff" font-size="28" font-weight="700">Ensayo MILD</text><text x="30" y="177" fill="#d8cde9" font-size="22"><tspan x="30">Recuerda una señal.</tspan><tspan x="30" dy="34">Imagina reconocerla</tspan><tspan x="30" dy="34">y ganar lucidez al</tspan><tspan x="30" dy="34">quedarte dormido.</tspan></text></g>
    <g transform="translate(890 245)"><rect width="235" height="390" rx="28" fill="#211742" stroke="#8e76d9"/><circle cx="48" cy="54" r="27" fill="#ffad9d"/><text x="48" y="63" text-anchor="middle" fill="#211128" font-size="26" font-weight="700">4</text><text x="30" y="125" fill="#fff" font-size="28" font-weight="700">WBTB selectivo</text><text x="30" y="177" fill="#d8cde9" font-size="22"><tspan x="30">Tras 5–6 horas,</tspan><tspan x="30" dy="34">despierta un momento,</tspan><tspan x="30" dy="34">fija tu intención y</tspan><tspan x="30" dy="34">vuelve a dormir.</tspan></text></g>
  </g>
  <rect x="80" y="700" width="1045" height="105" rx="24" fill="#17102f" stroke="#6d598e"/><text x="115" y="746" fill="#ffcabd" font-family="Arial, sans-serif" font-size="23" font-weight="700">Protege tu descanso</text><text x="115" y="780" fill="#cdbfe6" font-family="Arial, sans-serif" font-size="21">Reduce la práctica si los despertares provocan cansancio, ansiedad o malestar.</text>
</svg>
