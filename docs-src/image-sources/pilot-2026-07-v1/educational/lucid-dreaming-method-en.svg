<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <title>A beginner lucid dreaming routine</title>
  <desc>Four steps: reality checks, dream journal, MILD rehearsal and selective WBTB practice.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#100b2b"/><stop offset="1" stop-color="#42245c"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="14" stdDeviation="18" flood-opacity=".28"/></filter></defs>
  <rect width="1200" height="900" rx="48" fill="url(#bg)"/>
  <circle cx="1040" cy="120" r="170" fill="#ffb6a3" opacity=".08"/><circle cx="130" cy="790" r="220" fill="#9b79ff" opacity=".08"/>
  <text x="90" y="105" fill="#f8f1ff" font-family="Arial, sans-serif" font-size="48" font-weight="700">A beginner lucid dreaming routine</text>
  <text x="90" y="155" fill="#cdbfe6" font-family="Arial, sans-serif" font-size="25">Build recall and awareness before trying to control the dream.</text>
  <g font-family="Arial, sans-serif" filter="url(#s)">
    <g transform="translate(80 245)"><rect width="235" height="390" rx="28" fill="#211742" stroke="#8e76d9"/><circle cx="48" cy="54" r="27" fill="#ffad9d"/><text x="48" y="63" text-anchor="middle" fill="#211128" font-size="26" font-weight="700">1</text><text x="30" y="125" fill="#fff" font-size="29" font-weight="700">Reality checks</text><text x="30" y="177" fill="#d8cde9" font-size="22"><tspan x="30">Pause several times</tspan><tspan x="30" dy="34">a day and question</tspan><tspan x="30" dy="34">whether you are</tspan><tspan x="30" dy="34">dreaming.</tspan></text></g>
    <g transform="translate(350 245)"><rect width="235" height="390" rx="28" fill="#211742" stroke="#8e76d9"/><circle cx="48" cy="54" r="27" fill="#ffad9d"/><text x="48" y="63" text-anchor="middle" fill="#211128" font-size="26" font-weight="700">2</text><text x="30" y="125" fill="#fff" font-size="29" font-weight="700">Dream journal</text><text x="30" y="177" fill="#d8cde9" font-size="22"><tspan x="30">Record fragments as</tspan><tspan x="30" dy="34">soon as you wake.</tspan><tspan x="30" dy="34">Notice recurring</tspan><tspan x="30" dy="34">dream signs.</tspan></text></g>
    <g transform="translate(620 245)"><rect width="235" height="390" rx="28" fill="#211742" stroke="#8e76d9"/><circle cx="48" cy="54" r="27" fill="#ffad9d"/><text x="48" y="63" text-anchor="middle" fill="#211128" font-size="26" font-weight="700">3</text><text x="30" y="125" fill="#fff" font-size="29" font-weight="700">MILD rehearsal</text><text x="30" y="177" fill="#d8cde9" font-size="22"><tspan x="30">Recall a dream sign.</tspan><tspan x="30" dy="34">Imagine noticing it</tspan><tspan x="30" dy="34">and becoming lucid</tspan><tspan x="30" dy="34">as you fall asleep.</tspan></text></g>
    <g transform="translate(890 245)"><rect width="235" height="390" rx="28" fill="#211742" stroke="#8e76d9"/><circle cx="48" cy="54" r="27" fill="#ffad9d"/><text x="48" y="63" text-anchor="middle" fill="#211128" font-size="26" font-weight="700">4</text><text x="30" y="125" fill="#fff" font-size="29" font-weight="700">Selective WBTB</text><text x="30" y="177" fill="#d8cde9" font-size="22"><tspan x="30">After 5–6 hours,</tspan><tspan x="30" dy="34">wake briefly, set an</tspan><tspan x="30" dy="34">intention, then return</tspan><tspan x="30" dy="34">to sleep. Not nightly.</tspan></text></g>
  </g>
  <rect x="80" y="700" width="1045" height="105" rx="24" fill="#17102f" stroke="#6d598e"/><text x="115" y="746" fill="#ffcabd" font-family="Arial, sans-serif" font-size="23" font-weight="700">Protect your sleep</text><text x="115" y="780" fill="#cdbfe6" font-family="Arial, sans-serif" font-size="21">Stop or reduce the practice if awakenings make you tired, anxious or unwell.</text>
</svg>
