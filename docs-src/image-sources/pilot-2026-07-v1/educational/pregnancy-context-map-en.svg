<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <title>Context map for reflecting on pregnancy dreams</title><desc>Consider situation, emotion, dream scene and recent life context; dreams are not medical diagnoses.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#140d31"/><stop offset="1" stop-color="#542b5d"/></linearGradient></defs><rect width="1200" height="900" rx="48" fill="url(#bg)"/>
  <text x="85" y="105" fill="#fff7fb" font-family="Arial, sans-serif" font-size="47" font-weight="700">Read the dream through personal context</text><text x="85" y="153" fill="#d2c3e3" font-family="Arial, sans-serif" font-size="24">The same image can feel very different from one person or night to another.</text>
  <g stroke="#967bc7" stroke-width="4" opacity=".7"><path d="M600 430L300 300M600 430L900 300M600 430L300 625M600 430L900 625"/></g>
  <circle cx="600" cy="430" r="132" fill="#2b1b4b" stroke="#ffb19f" stroke-width="4"/><path d="M565 425c0-65 70-90 105-42 30 42-10 99-70 131-43-29-67-55-67-89 0-27 16-47 32-55" fill="none" stroke="#ffd0c5" stroke-width="10" stroke-linecap="round"/><text x="600" y="590" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="25" font-weight="700">YOUR DREAM</text>
  <g font-family="Arial, sans-serif"><g transform="translate(100 205)"><rect width="350" height="170" rx="25" fill="#211640" stroke="#8d73c1"/><text x="28" y="50" fill="#ffb6a4" font-size="22" font-weight="700">SITUATION</text><text x="28" y="90" fill="#fff" font-size="23">Pregnant, trying, not pregnant,</text><text x="28" y="124" fill="#fff" font-size="23">partner or observer?</text></g><g transform="translate(750 205)"><rect width="350" height="170" rx="25" fill="#211640" stroke="#8d73c1"/><text x="28" y="50" fill="#ffb6a4" font-size="22" font-weight="700">EMOTION</text><text x="28" y="90" fill="#fff" font-size="23">Joy, fear, surprise, grief,</text><text x="28" y="124" fill="#fff" font-size="23">pressure or curiosity?</text></g><g transform="translate(100 570)"><rect width="350" height="170" rx="25" fill="#211640" stroke="#8d73c1"/><text x="28" y="50" fill="#ffb6a4" font-size="22" font-weight="700">DREAM SCENE</text><text x="28" y="90" fill="#fff" font-size="23">Pregnancy, birth, baby, test</text><text x="28" y="124" fill="#fff" font-size="23">or someone else’s news?</text></g><g transform="translate(750 570)"><rect width="350" height="170" rx="25" fill="#211640" stroke="#8d73c1"/><text x="28" y="50" fill="#ffb6a4" font-size="22" font-weight="700">RECENT CONTEXT</text><text x="28" y="90" fill="#fff" font-size="23">Change, responsibility, health</text><text x="28" y="124" fill="#fff" font-size="23">concern or conversation?</text></g></g>
  <text x="600" y="825" text-anchor="middle" fill="#ffd0c5" font-family="Arial, sans-serif" font-size="22" font-weight="700">A dream is not a medical diagnosis or prediction.</text>
</svg>
