<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <title>Matriz de contexto para sueños de agua</title><desc>Compara agua clara, turbia, tranquila o desbordada con la emoción y el contexto personal.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#0b1533"/><stop offset="1" stop-color="#34306b"/></linearGradient></defs><rect width="1200" height="900" rx="48" fill="url(#bg)"/>
  <text x="80" y="105" fill="#f7f4ff" font-family="Arial, sans-serif" font-size="48" font-weight="700">El estado del agua cambia la pregunta</text><text x="80" y="153" fill="#c7c7e8" font-family="Arial, sans-serif" font-size="24">Relaciona el sueño con la emoción y tu situación; evita significados automáticos.</text>
  <g font-family="Arial, sans-serif"><g transform="translate(80 220)"><rect width="495" height="245" rx="28" fill="#14254b" stroke="#61b9d2"/><path d="M0 150c100-40 200 40 300 0s150 10 195-10v105H0Z" fill="#4cb8d3" opacity=".28"/><text x="34" y="58" fill="#87dff0" font-size="25" font-weight="700">AGUA CLARA</text><text x="34" y="103" fill="#fff" font-size="23">¿Qué se veía con claridad?</text><text x="34" y="137" fill="#d6ddf2" font-size="21">Calma, comprensión, exposición.</text></g><g transform="translate(625 220)"><rect width="495" height="245" rx="28" fill="#252845" stroke="#7b839e"/><path d="M0 150c110-45 215 45 315 0s140 5 180-15v110H0Z" fill="#80879a" opacity=".25"/><text x="34" y="58" fill="#b9bfd0" font-size="25" font-weight="700">AGUA TURBIA</text><text x="34" y="103" fill="#fff" font-size="23">¿Qué resultaba confuso?</text><text x="34" y="137" fill="#d6ddf2" font-size="21">Duda, sobrecarga, incertidumbre.</text></g><g transform="translate(80 515)"><rect width="495" height="245" rx="28" fill="#15274a" stroke="#77a9e5"/><path d="M0 172h495v73H0Z" fill="#668fd0" opacity=".22"/><path d="M25 172h445" stroke="#9bc3ef" stroke-width="3"/><text x="34" y="58" fill="#a9d0ff" font-size="25" font-weight="700">AGUA TRANQUILA</text><text x="34" y="103" fill="#fff" font-size="23">¿Había pausa o estancamiento?</text><text x="34" y="137" fill="#d6ddf2" font-size="21">Descanso, contención, espera.</text></g><g transform="translate(625 515)"><rect width="495" height="245" rx="28" fill="#252044" stroke="#bf75b5"/><path d="M0 105c110-65 190 80 300 15s155 40 195 5v120H0Z" fill="#a7509c" opacity=".28"/><text x="34" y="58" fill="#f0a2dd" font-size="25" font-weight="700">AGUA DESBORDADA</text><text x="34" y="103" fill="#fff" font-size="23">¿Qué superaba tus límites?</text><text x="34" y="137" fill="#d6ddf2" font-size="21">Intensidad, pérdida de control.</text></g></g>
  <text x="600" y="830" text-anchor="middle" fill="#d7d4ed" font-family="Arial, sans-serif" font-size="22">Pregunta también: ¿dónde estaba el agua, qué hacías y cómo te sentías?</text>
</svg>
