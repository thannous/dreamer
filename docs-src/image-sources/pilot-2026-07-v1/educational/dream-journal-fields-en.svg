<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <title>Five useful dream journal fields</title><desc>Record the scene, people, emotions, senses and waking context before interpretation.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#120c2e"/><stop offset="1" stop-color="#4a285e"/></linearGradient><filter id="s"><feDropShadow dy="12" stdDeviation="16" flood-opacity=".3"/></filter></defs>
  <rect width="1200" height="900" rx="48" fill="url(#bg)"/><text x="86" y="105" fill="#fff6fb" font-family="Arial, sans-serif" font-size="48" font-weight="700">What to record when you wake</text><text x="86" y="153" fill="#cfc1e4" font-family="Arial, sans-serif" font-size="24">Capture first. Interpret later.</text>
  <g transform="translate(430 220)" filter="url(#s)"><rect width="340" height="510" rx="28" fill="#f5e9df"/><path d="M70 0v510" stroke="#e3a298" stroke-width="3"/><g stroke="#b6a5b8" stroke-width="2"><path d="M95 100h205M95 155h205M95 210h205M95 265h205M95 320h205M95 375h205M95 430h205"/></g><circle cx="36" cy="90" r="7" fill="#bf90bd"/><circle cx="36" cy="180" r="7" fill="#bf90bd"/><circle cx="36" cy="270" r="7" fill="#bf90bd"/><circle cx="36" cy="360" r="7" fill="#bf90bd"/><circle cx="36" cy="450" r="7" fill="#bf90bd"/></g>
  <g font-family="Arial, sans-serif">
    <g transform="translate(75 230)"><rect width="300" height="105" rx="22" fill="#251943" stroke="#9b80d5"/><text x="24" y="44" fill="#ffb8a8" font-size="20" font-weight="700">01 · SCENE</text><text x="24" y="78" fill="#fff" font-size="22">Where were you?</text></g>
    <g transform="translate(75 375)"><rect width="300" height="105" rx="22" fill="#251943" stroke="#9b80d5"/><text x="24" y="44" fill="#ffb8a8" font-size="20" font-weight="700">02 · PEOPLE</text><text x="24" y="78" fill="#fff" font-size="22">Who was present?</text></g>
    <g transform="translate(75 520)"><rect width="300" height="105" rx="22" fill="#251943" stroke="#9b80d5"/><text x="24" y="44" fill="#ffb8a8" font-size="20" font-weight="700">03 · EMOTIONS</text><text x="24" y="78" fill="#fff" font-size="22">How did it feel?</text></g>
    <g transform="translate(825 300)"><rect width="300" height="105" rx="22" fill="#251943" stroke="#9b80d5"/><text x="24" y="44" fill="#ffb8a8" font-size="20" font-weight="700">04 · SENSES</text><text x="24" y="78" fill="#fff" font-size="22">Colors, sounds, touch?</text></g>
    <g transform="translate(825 465)"><rect width="300" height="125" rx="22" fill="#251943" stroke="#9b80d5"/><text x="24" y="44" fill="#ffb8a8" font-size="20" font-weight="700">05 · WAKING CONTEXT</text><text x="24" y="78" fill="#fff" font-size="21">Recent events, sleep</text><text x="24" y="105" fill="#fff" font-size="21">conditions or concerns?</text></g>
  </g><text x="600" y="825" text-anchor="middle" fill="#d9cde9" font-family="Arial, sans-serif" font-size="22">Even a few words are useful. Add the date and write before checking your phone.</text>
</svg>
