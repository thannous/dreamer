<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <title>Matriz de reflexión para sueños de volar</title><desc>Explora libertad, control, huida y miedo a caer según la emoción y el contexto.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#100c31"/><stop offset="1" stop-color="#43316b"/></linearGradient></defs><rect width="1200" height="900" rx="48" fill="url(#bg)"/>
  <text x="80" y="105" fill="#faf5ff" font-family="Arial, sans-serif" font-size="48" font-weight="700">¿Cómo se sentía el vuelo?</text><text x="80" y="153" fill="#cec4e7" font-family="Arial, sans-serif" font-size="24">Observa la emoción, el control y tu contexto antes de elegir una interpretación.</text>
  <g font-family="Arial, sans-serif"><g transform="translate(80 220)"><rect width="495" height="245" rx="28" fill="#211944" stroke="#9b82e0"/><text x="34" y="58" fill="#ffb6a4" font-size="25" font-weight="700">LIBERTAD</text><text x="34" y="106" fill="#fff" font-size="23">¿Ligero, abierto, sin esfuerzo?</text><text x="34" y="145" fill="#d8cfeb" font-size="21">¿Dónde deseas más espacio</text><text x="34" y="177" fill="#d8cfeb" font-size="21">o posibilidades al estar despierto?</text></g><g transform="translate(625 220)"><rect width="495" height="245" rx="28" fill="#211944" stroke="#9b82e0"/><text x="34" y="58" fill="#ffb6a4" font-size="25" font-weight="700">CONTROL</text><text x="34" y="106" fill="#fff" font-size="23">¿Podías dirigir o cambiar altura?</text><text x="34" y="145" fill="#d8cfeb" font-size="21">¿Qué puedes manejar o cuesta</text><text x="34" y="177" fill="#d8cfeb" font-size="21">orientar en tu vida diaria?</text></g><g transform="translate(80 515)"><rect width="495" height="245" rx="28" fill="#211944" stroke="#9b82e0"/><text x="34" y="58" fill="#ffb6a4" font-size="25" font-weight="700">HUIDA</text><text x="34" y="106" fill="#fff" font-size="23">¿Dejabas atrás peligro o presión?</text><text x="34" y="145" fill="#d8cfeb" font-size="21">¿Qué límite, demanda o conflicto</text><text x="34" y="177" fill="#d8cfeb" font-size="21">ha estado presente últimamente?</text></g><g transform="translate(625 515)"><rect width="495" height="245" rx="28" fill="#211944" stroke="#9b82e0"/><text x="34" y="58" fill="#ffb6a4" font-size="25" font-weight="700">MIEDO A CAER</text><text x="34" y="106" fill="#fff" font-size="23">¿Inestable, muy alto, sin impulso?</text><text x="34" y="145" fill="#d8cfeb" font-size="21">¿Dónde faltan ahora confianza</text><text x="34" y="177" fill="#d8cfeb" font-size="21">o apoyo?</text></g></g>
  <text x="600" y="830" text-anchor="middle" fill="#d8cfeb" font-family="Arial, sans-serif" font-size="22">Un sueño puede reunir varios temas; empieza por lo que sentías mientras volabas.</text>
</svg>
