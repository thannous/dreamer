<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <title>Timeline of dream interpretation approaches</title><desc>From ancient traditions through Freud and Jung to modern neuroscience.</desc>
  <defs><linearGradient id="bg" x2="1" y2="1"><stop stop-color="#0f0a29"/><stop offset="1" stop-color="#452458"/></linearGradient></defs><rect width="1200" height="900" rx="48" fill="url(#bg)"/>
  <text x="80" y="105" fill="#fff6fb" font-family="Arial, sans-serif" font-size="46" font-weight="700">Ways of understanding dreams over time</text><text x="80" y="153" fill="#d0c1e3" font-family="Arial, sans-serif" font-size="24">A simplified map of influential frameworks—not a single linear progression.</text>
  <path d="M120 440H1080" stroke="#9c82dc" stroke-width="8" stroke-linecap="round"/>
  <g font-family="Arial, sans-serif">
    <g transform="translate(100 245)"><rect width="210" height="145" rx="24" fill="#211641" stroke="#a38ae0"/><text x="24" y="44" fill="#ffb8a8" font-size="21" font-weight="700">ANTIQUITY</text><text x="24" y="80" fill="#fff" font-size="22">Mesopotamia,</text><text x="24" y="111" fill="#fff" font-size="22">Egypt, Greece</text><circle cx="105" cy="195" r="21" fill="#ffad9d"/></g>
    <g transform="translate(350 490)"><circle cx="105" cy="-50" r="21" fill="#ffad9d"/><rect width="210" height="155" rx="24" fill="#211641" stroke="#a38ae0"/><text x="24" y="44" fill="#ffb8a8" font-size="21" font-weight="700">TRADITIONS</text><text x="24" y="80" fill="#fff" font-size="22">Religious and</text><text x="24" y="111" fill="#fff" font-size="22">cultural readings</text></g>
    <g transform="translate(600 245)"><rect width="210" height="145" rx="24" fill="#211641" stroke="#a38ae0"/><text x="24" y="44" fill="#ffb8a8" font-size="21" font-weight="700">1900s</text><text x="24" y="80" fill="#fff" font-size="22">Freud and the</text><text x="24" y="111" fill="#fff" font-size="22">unconscious</text><circle cx="105" cy="195" r="21" fill="#ffad9d"/></g>
    <g transform="translate(850 490)"><circle cx="105" cy="-50" r="21" fill="#ffad9d"/><rect width="210" height="155" rx="24" fill="#211641" stroke="#a38ae0"/><text x="24" y="44" fill="#ffb8a8" font-size="21" font-weight="700">20th–21st C.</text><text x="24" y="80" fill="#fff" font-size="22">Jung, cognitive</text><text x="24" y="111" fill="#fff" font-size="22">and neuroscience</text></g>
  </g>
  <rect x="100" y="730" width="1000" height="90" rx="22" fill="#17102f" stroke="#695889"/><text x="600" y="770" text-anchor="middle" fill="#f5edf9" font-family="Arial, sans-serif" font-size="22">Today, cultural meaning, personal reflection and sleep science can coexist</text><text x="600" y="801" text-anchor="middle" fill="#cbbde0" font-family="Arial, sans-serif" font-size="20">without turning dream imagery into diagnosis or prediction.</text>
</svg>
